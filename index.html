<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXCORE // Music Dashboard v2.3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Пастельна muted палітра */
            --bg-color: #14161d;
            --card-bg: #1a1d24;
            --card-border: #232733;
            --text-main: #dee0e6;
            --text-muted: #727a8e;
            
            /* М'які пастельні кольори платформ */
            --youtube: #e06c75;       
            --soundcloud: #f0a986;    
            --bandcamp: #7aa2f7;      
            --total: #b4befe;         
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%; 
            max-width: 950px; 
        }

        header {
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 20px;
        }

        h1 { 
            font-size: 1.3rem; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin: 0 0 10px 0; 
            color: var(--text-main);
        }
        
        .last-updated { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
        }

        .total-counter {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-left: 4px solid var(--total);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .total-counter .label { 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
        }
        
        .total-counter .value { 
            font-size: 2.8rem; 
            font-weight: 800; 
            color: var(--total); 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 22px;
            display: flex;
            flex-direction: column;
        }

        .card .platform-name { 
            font-size: 1.05rem; 
            font-weight: 700; 
            margin-bottom: 18px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            margin-bottom: 12px; 
        }
        
        .card .row:last-child { 
            margin-bottom: 0; 
        }
        
        .card .val { 
            font-size: 1.5rem; 
            font-weight: 700; 
        }
        
        .card .lbl { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .card.youtube { border-top: 4px solid var(--youtube); }
        .card.youtube .platform-name { color: var(--youtube); }
        
        .card.soundcloud { border-top: 4px solid var(--soundcloud); }
        .card.soundcloud .platform-name { color: var(--soundcloud); }
        
        .card.bandcamp { border-top: 4px solid var(--bandcamp); }
        .card.bandcamp .platform-name { color: var(--bandcamp); }

        .chart-container {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            height: 400px; 
            position: relative;
            box-sizing: border-box;
        }
        
        .chart-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>FOXCORE // MUSIC METRICS</h1>
            <div class="last-updated" id="update-time">Оновлено: --:--:--</div>
        </header>

        <div class="total-counter">
            <div class="label">Загальне охоплення</div>
            <div class="value" id="total-views">0</div>
        </div>

        <div class="grid">
            <div class="card youtube">
                <div class="platform-name">YouTube</div>
                <div class="row"><span class="val" id="yt-views">0</span><span class="lbl">Перегляди</span></div>
                <div class="row"><span class="val" id="yt-subs">0</span><span class="lbl">Підписники</span></div>
            </div>

            <div class="card soundcloud">
                <div class="platform-name">SoundCloud</div>
                <div class="row"><span class="val" id="sc-views">0</span><span class="lbl">Стрими</span></div>
                <div class="row"><span class="val" id="sc-subs">0</span><span class="lbl">Фоловери</span></div>
            </div>

            <div class="card bandcamp">
                <div class="platform-name">Bandcamp</div>
                <div class="row"><span class="val" id="bc-views">0</span><span class="lbl">Стрими</span></div>
                <div class="row"><span class="val" id="bc-subs">0</span><span class="lbl">Фанатів</span></div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">Динаміка платформ по прослуховуваннях</div>
            <canvas id="metricsChart"></canvas>
        </div>
    </div>

    <script src="stats.js"></script>
    <script>
        function formatNum(num) { 
            return num.toString(); 
        }

        function initDashboard() {
            if (!window.dashboardStats) return;
            const data = window.dashboardStats;

            document.getElementById('update-time').innerText = `Оновлено: ${data.lastUpdated}`;
            document.getElementById('total-views').innerText = formatNum(data.current.totalAudioVideoViews);
            
            document.getElementById('yt-views').innerText = formatNum(data.current.youtube.views);
            document.getElementById('yt-subs').innerText = formatNum(data.current.youtube.subs);
            
            document.getElementById('sc-views').innerText = formatNum(data.current.soundcloud.plays);
            document.getElementById('sc-subs').innerText = formatNum(data.current.soundcloud.subs);
            
            document.getElementById('bc-views').innerText = formatNum(data.current.bandcamp.plays);
            document.getElementById('bc-subs').innerText = formatNum(data.current.bandcamp.subs);

            const history = data.history || [];
            const labels = history.map(item => item.date);
            
            // Витягуємо окремі масиви даних для кожної платформи
            const ytViewsData = history.map(item => item.ytViews || 0);
            const scPlaysData = history.map(item => item.scPlays || 0);
            const bcPlaysData = history.map(item => item.bcPlays || 0);

            const ctx = document.getElementById('metricsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'YouTube',
                            data: ytViewsData,
                            borderColor: '#e06c75', // Пастельний червоний
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.3,
                            pointBackgroundColor: '#e06c75',
                            pointRadius: 4
                        },
                        {
                            label: 'SoundCloud',
                            data: scPlaysData,
                            borderColor: '#f0a986', // Пастельний персик
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.3,
                            pointBackgroundColor: '#f0a986',
                            pointRadius: 4
                        },
                        {
                            label: 'Bandcamp',
                            data: bcPlaysData,
                            borderColor: '#7aa2f7', // Пастельний синій
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.3,
                            pointBackgroundColor: '#7aa2f7',
                            pointRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#727a8e', // Колір тексту легенди под стиль темы
                                font: { size: 12, family: 'sans-serif' },
                                boxWidth: 15,
                                padding: 15
                            }
                        } 
                    },
                    scales: {
                        x: { 
                            grid: { color: '#232733' }, 
                            ticks: { color: '#727a8e', font: { size: 11 } } 
                        },
                        y: { 
                            grid: { color: '#232733' }, 
                            ticks: { color: '#727a8e', font: { size: 11 } } 
                        }
                    }
                }
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
