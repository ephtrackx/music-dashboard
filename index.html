<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXCORE // Music Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Motion-Driven Design System Variables */
        :root {
            --bg-color: #0f1014;
            --card-bg: rgba(26, 29, 36, 0.6);
            --card-border: 1px solid rgba(255, 255, 255, 0.08);
            --text-main: #dee0e6;
            --text-muted: #727a8e;
            
            --youtube: #e06c75;       
            --soundcloud: #f0a986;    
            --bandcamp: #7aa2f7;      
            --total: #b4befe;
            
            --blur-amount: 15px;
            --border-radius: 0.75rem;
            
            /* Motion Physics: Confident, weighted transitions */
            --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 540ms cubic-bezier(0.25, 1, 0.5, 1);
        }

        html {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1c1f2e, #0f1014);
            min-height: 100dvh;
            opacity: 0;
            transition: opacity 500ms ease;
            scroll-behavior: smooth;
        }

        body {
            background-color: transparent;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: clamp(2rem, 5vw, 4rem) 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container { 
            max-width: 1280px; 
            width: 100%; 
            display: grid;
            gap: 24px;
        }

        header { 
            margin-bottom: 12px;
            animation: entryFadeTranslate 540ms var(--transition-spring) forwards;
        }

        h1 { 
            font-size: clamp(1.5rem, 3vw, 2.25rem); 
            font-weight: 700; 
            margin: 0 0 0.5rem 0; 
            letter-spacing: -0.5px; 
        }

        .last-updated { 
            color: var(--text-muted); 
            font-size: 0.875rem; 
            font-weight: 500; 
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: var(--card-border);
            border-radius: var(--border-radius);
            padding: 24px;
            cursor: pointer;
            position: relative;
            will-change: transform, border-color, background-color;
            transition: transform var(--transition-smooth), border-color var(--transition-smooth), background-color var(--transition-smooth);
            
            /* Entry Animation: Fade + translate-Y */
            opacity: 0;
            animation: entryFadeTranslate 540ms var(--transition-spring) forwards;
        }

        /* Staggered cascades for cards */
        .stat-card:nth-child(1) { animation-delay: 60ms; }
        .stat-card:nth-child(2) { animation-delay: 120ms; }
        .stat-card:nth-child(3) { animation-delay: 180ms; }
        .stat-card:nth-child(4) { animation-delay: 240ms; }

        /* Motion-Driven Hover: Scale(1.03) + subtle border highlight */
        .stat-card:hover { 
            transform: scale(1.03) translateY(-2px); 
            border-color: rgba(255, 255, 255, 0.2); 
        }
        
        /* Active State: Tactile press translation */
        .stat-card:active {
            transform: scale(1.01) translateY(0px);
        }

        .stat-card.active { 
            border-color: rgba(255, 255, 255, 0.35); 
            background: rgba(35, 40, 50, 0.8); 
        }

        .card-label { 
            color: var(--text-muted); 
            font-size: 0.875rem; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 12px; 
        }

        .card-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 2rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            letter-spacing: -1px; 
        }

        .stat-card.youtube .card-value { color: var(--youtube); }
        .stat-card.soundcloud .card-value { color: var(--soundcloud); }
        .stat-card.bandcamp .card-value { color: var(--bandcamp); }
        .stat-card.total .card-value { color: var(--total); }

        .card-subtext { color: var(--text-muted); font-size: 0.875rem; }

        .chart-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            border: var(--card-border);
            border-radius: var(--border-radius);
            padding: 24px;
            opacity: 0;
            animation: entryFadeTranslate 540ms var(--transition-spring) forwards;
            animation-delay: 300ms;
        }

        .chart-section h2 { 
            font-size: 1.125rem; 
            font-weight: 600; 
            margin: 0 0 24px 0; 
            transition: color var(--transition-smooth);
        }
        
        .chart-container { 
            position: relative; 
            height: 450px; 
            width: 100%; 
        }

        @keyframes entryFadeTranslate {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    
    <script>
        (function() {
            const secureHash = "Rm94Q29yZTIwMjY=";
            let pass = localStorage.getItem('music_dashboard_token');
            if (!pass || btoa(pass) !== secureHash) {
                pass = prompt("Введіть пароль доступу:");
                if (pass && btoa(pass) === secureHash) {
                    localStorage.setItem('music_dashboard_token', pass);
                } else {
                    alert("Доступ заборонено!");
                    document.write('<body style="background:#0f1014;color:#e06c75;text-align:center;padding-top:200px;font-family:sans-serif;"><h2>403 // СТОП</h2></body>');
                    return;
                }
            }
            document.documentElement.style.opacity = "1";
        })();
    </script>
    <script src="stats.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>FOXCORE // Music Dashboard</h1>
            <div class="last-updated" id="updateTime">Оновлення: --</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card youtube" onclick="changePlatform('youtube')">
                <div class="card-label">YouTube</div>
                <div class="card-value" id="ytViews">0</div>
                <div class="card-subtext" id="ytSubs">0 підписників</div>
            </div>
            <div class="stat-card soundcloud" onclick="changePlatform('soundcloud')">
                <div class="card-label">SoundCloud</div>
                <div class="card-value" id="scPlays">0</div>
                <div class="card-subtext" id="scFollowers">0 фоловерів</div>
            </div>
            <div class="stat-card bandcamp" onclick="changePlatform('bandcamp')">
                <div class="card-label">Bandcamp</div>
                <div class="card-value" id="bcEarnings">0</div>
                <div class="card-subtext" id="bcStats">0 підписників</div>
            </div>
            <div class="stat-card total active" id="totalCard" onclick="changePlatform('total')">
                <div class="card-label">Загальні стрими</div>
                <div class="card-value" id="totalReach">0</div>
                <div class="card-subtext" id="totalSubs">0 сумарних підписників</div>
            </div>
        </div>

        <div class="chart-section">
            <h2 id="chartTitle">Динаміка: Загальні стрими за останній місяць</h2>
            <div class="chart-container">
                <canvas id="reachChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function changePlatform(platform) {
            const data = window.dashboardStats;
            if (!data) return;

            document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active'));
            
            // Беремо останні 30 записів для фільтрації за останній місяць
            const monthlyHistory = data.history.slice(-30);
            
            let dataset = [];
            let color = '#b4befe';
            let title = 'Загальні стрими';

            if (platform === 'youtube') {
                document.querySelector('.stat-card.youtube').classList.add('active');
                dataset = monthlyHistory.map(item => item.ytViews || 0);
                color = '#e06c75';
                title = 'YouTube';
            } else if (platform === 'soundcloud') {
                document.querySelector('.stat-card.soundcloud').classList.add('active');
                dataset = monthlyHistory.map(item => item.scPlays || 0);
                color = '#f0a986';
                title = 'SoundCloud';
            } else if (platform === 'bandcamp') {
                document.querySelector('.stat-card.bandcamp').classList.add('active');
                dataset = monthlyHistory.map(item => item.bcPlays || 0);
                color = '#7aa2f7';
                title = 'Bandcamp';
            } else {
                document.getElementById('totalCard').classList.add('active');
                dataset = monthlyHistory.map(item => item.totalPlays || 0);
                color = '#b4befe';
                title = 'Загальні стрими';
            }

            document.getElementById('chartTitle').innerText = `Динаміка: ${title} за останній місяць`;

            // Оновлення графіку з ефектом плавного переходу
            myChart.data.labels = monthlyHistory.map(item => item.date);
            myChart.data.datasets[0].data = dataset;
            myChart.data.datasets[0].borderColor = color;
            myChart.data.datasets[0].backgroundColor = `${color}15`;
            myChart.update('active');
        }

        function initDashboard() {
            const data = window.dashboardStats;
            if (!data) return;

            document.getElementById('updateTime').innerText = `Оновлено: ${data.lastUpdated || '--'}`;
            const cur = data.current || {};
            
            document.getElementById('ytViews').innerText = Number(cur.youtube?.views || 0).toLocaleString('uk-UA');
            document.getElementById('ytSubs').innerText = `${Number(cur.youtube?.subs || 0).toLocaleString('uk-UA')} підписників`;
            document.getElementById('scPlays').innerText = Number(cur.soundcloud?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('scFollowers').innerText = `${Number(cur.soundcloud?.subs || 0).toLocaleString('uk-UA')} фоловерів`;
            document.getElementById('bcEarnings').innerText = Number(cur.bandcamp?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('bcStats').innerText = `${Number(cur.bandcamp?.subs || 0).toLocaleString('uk-UA')} підписників`;
            document.getElementById('totalReach').innerText = Number(cur.totalAudioVideoViews || 0).toLocaleString('uk-UA');
            document.getElementById('totalSubs').innerText = `${Number(cur.totalSubscribers || 0).toLocaleString('uk-UA')} сумарних підписників`;

            // Беремо останні 30 точок для первинної ініціалізації
            const monthlyHistory = data.history.slice(-30);

            const ctx = document.getElementById('reachChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: monthlyHistory.map(item => item.date),
                    datasets: [{
                        label: 'Стрими',
                        data: monthlyHistory.map(item => item.totalPlays || 0),
                        borderColor: '#b4befe',
                        backgroundColor: '#b4befe15',
                        borderWidth: 2.5,
                        tension: 0.3,
                        fill: true,
                        // Прибираємо ноди (крапки) повністю
                        pointRadius: 0, 
                        pointHoverRadius: 0,
                        pointHitRadius: 10 // залишаємо радіус для спрацьовування тултіпу
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 540, easing: 'easeOutCubic' },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(26, 29, 36, 0.95)',
                            padding: 12,
                            titleFont: { family: 'JetBrains Mono' },
                            bodyFont: { family: 'JetBrains Mono' },
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed.y;
                                    const dataIndex = context.dataIndex;
                                    const dataset = context.dataset.data;
                                    
                                    let changeText = "";
                                    if (dataIndex > 0) {
                                        const prevValue = dataset[dataIndex - 1];
                                        const diff = value - prevValue;
                                        const sign = diff >= 0 ? "+" : "";
                                        changeText = ` (${sign}${diff.toLocaleString('uk-UA')})`;
                                    }
                                    
                                    return `${value.toLocaleString('uk-UA')}${changeText}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            // Повністю приховуємо дати та вісь X
                            display: false,
                            grid: { display: false }
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.04)' }, 
                            ticks: { color: '#727a8e', font: { family: 'JetBrains Mono' } } 
                        }
                    }
                }
            });
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
