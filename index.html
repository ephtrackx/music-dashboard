<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXCORE // Music Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        /* Глобальні налаштування стилю Chart.js без втручання в основну логіку */
        Chart.defaults.set('elements.point', { radius: 0, hoverRadius: 0 });
        Chart.defaults.set('scales.x', { display: false });
        Chart.defaults.set('layout', { padding: { left: 15, right: 15, top: 10, bottom: 10 } });
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           DESIGN SYSTEM: HIGH-VIBRANCY PREMIUM LIQUID GLASS
           ========================================================================== */
        :root {
            --bg-color: #050711;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-bg-hover: rgba(255, 255, 255, 0.07);
            --card-bg-active: rgba(255, 255, 255, 0.1);
            --card-border: 1px solid rgba(255, 255, 255, 0.08);
            
            --text-main: #ffffff;
            --text-muted: #858fae;
            
            /* Надвисока візуальна насиченість оригінальних кольорів платформ */
            --youtube: #ff1a35;       
            --soundcloud: #ff6a00;    
            --bandcamp: #00b0ff;      
            --total: #bd00ff;
            
            --blur-amount: 30px;
            --border-radius: 1.25rem;
            --transition-spring: 600ms cubic-bezier(0.25, 1, 0.5, 1);
            
            /* Базова фіолетова аура для загальних стримів */
            --dynamic-glow: rgba(189, 0, 255, 0.14);
        }

        /* Автоматичне перетікання тла под колір активної картки через чистий CSS */
        html:has(.stat-card.youtube.active) { --dynamic-glow: rgba(255, 26, 53, 0.16); }
        html:has(.stat-card.soundcloud.active) { --dynamic-glow: rgba(255, 106, 0, 0.16); }
        html:has(.stat-card.bandcamp.active) { --dynamic-glow: rgba(0, 176, 255, 0.16); }
        html:has(.stat-card.total.active) { --dynamic-glow: rgba(189, 0, 255, 0.16); }

        /* Пружинні анімації заголовку графіка при зміні платформ */
        html:has(.stat-card.youtube.active) #chartTitle { animation: titlePopYT var(--transition-spring); }
        html:has(.stat-card.soundcloud.active) #chartTitle { animation: titlePopSC var(--transition-spring); }
        html:has(.stat-card.bandcamp.active) #chartTitle { animation: titlePopBC var(--transition-spring); }
        html:has(.stat-card.total.active) #chartTitle { animation: titlePopTotal var(--transition-spring); }

        /* Кінетичний мікро-зсув самого графіка для відчуття інтерактивності */
        html:has(.stat-card.youtube.active) .chart-container { animation: chartNudge var(--transition-spring); }
        html:has(.stat-card.soundcloud.active) .chart-container { animation: chartNudge var(--transition-spring); }
        html:has(.stat-card.bandcamp.active) .chart-container { animation: chartNudge var(--transition-spring); }
        html:has(.stat-card.total.active) .chart-container { animation: chartNudge var(--transition-spring); }

        html {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 35%, var(--dynamic-glow) 0%, transparent 45%),
                radial-gradient(circle at 85% 70%, rgba(0, 176, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% -20%, #11152e 0%, #050711 100%);
            min-height: 100dvh;
            opacity: 0;
            transition: opacity 0.5s ease, background-image 600ms ease-in-out;
            scroll-behavior: smooth;
        }

        body {
            background-color: transparent;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: clamp(2rem, 5vw, 4rem) 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-container { max-width: 1280px; width: 100%; }
        header { margin-bottom: clamp(2rem, 5vw, 4rem); }
        
        /* Ефект Хроматичної Аберації для головного імені */
        h1 { 
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700; 
            margin: 0 0 0.75rem 0; 
            letter-spacing: -0.04em;
            text-shadow: 
                -2px -1px 0px rgba(0, 176, 255, 0.55), 
                 2px 1px 0px rgba(255, 26, 53, 0.55);
        }
        
        .last-updated { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(140%);
            border: var(--card-border);
            border-radius: var(--border-radius);
            padding: 28px 24px;
            transition: var(--transition-spring);
            cursor: pointer;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .stat-card:hover { 
            transform: translateY(-6px) scale(1.02); 
            border-color: rgba(255, 255, 255, 0.25); 
            background: var(--card-bg-hover);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        }
        
        .stat-card:active { transform: scale(0.99) translateY(-2px); }

        .stat-card.active { 
            border-color: rgba(255, 255, 255, 0.4); 
            background: var(--card-bg-active); 
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05), 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .card-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
        
        /* Цифри показників тепер використовують преміальний системний гротеск замість Monospace */
        .card-value { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; 
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            letter-spacing: -0.03em; 
        }

        .stat-card.youtube .card-value { color: var(--youtube); }
        .stat-card.soundcloud .card-value { color: var(--soundcloud); }
        .stat-card.bandcamp .card-value { color: var(--bandcamp); }
        .stat-card.total .card-value { color: var(--total); }

        .card-subtext { color: var(--text-muted); font-size: 0.875rem; }

        .chart-section {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(140%);
            border: var(--card-border);
            border-radius: var(--border-radius);
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .chart-section h2 { font-size: 1.5rem; font-weight: 700; margin: 0 0 32px 0; letter-spacing: -0.02em; will-change: transform, opacity; }
        
        /* Автоматичне додавання текста до заголовків через CSS */
        #chartTitle::after { content: " за останній місяць"; }
        
        .chart-container { position: relative; height: 450px; width: 100%; will-change: transform; }

        /* Keyframes для пружинного вильоту заголовків */
        @keyframes titlePopYT {
            0% { opacity: 0; transform: translateY(6px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes titlePopSC {
            0% { opacity: 0; transform: translateY(6px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes titlePopBC {
            0% { opacity: 0; transform: translateY(6px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes titlePopTotal {
            0% { opacity: 0; transform: translateY(6px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes chartNudge {
            0% { transform: scale(0.996); opacity: 0.95; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
    
    <script>
        (function() {
            const secureHash = "Rm94Q29yZTIwMjY=";
            let pass = localStorage.getItem('music_dashboard_token');
            if (!pass || btoa(pass) !== secureHash) {
                pass = prompt("Введіть пароль доступу:");
                if (pass && btoa(pass) === secureHash) {
                    localStorage.setItem('music_dashboard_token', pass);
                } else {
                    alert("Доступ заборонено!");
                    document.write('<body style="background:#060813;color:#ff1a35;text-align:center;padding-top:200px;font-family:sans-serif;"><h2>403 // СТОП</h2></body>');
                    return;
                }
            }
            document.documentElement.style.opacity = "1";
        })();
    </script>
    <script src="stats.js"></script>
    <script>
        /* Пре-фільтрація даних історії до 30 днів відразу після завантаження stats.js */
        if (window.dashboardStats && window.dashboardStats.history) {
            window.dashboardStats.history = window.dashboardStats.history.slice(-30);
        }
    </script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>FOXCORE // Music Dashboard</h1>
            <div class="last-updated" id="updateTime">Оновлення: --</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card youtube" onclick="changePlatform('youtube')">
                <div class="card-label">YouTube</div>
                <div class="card-value" id="ytViews">0</div>
                <div class="card-subtext" id="ytSubs">0 підписників</div>
            </div>
            <div class="stat-card soundcloud" onclick="changePlatform('soundcloud')">
                <div class="card-label">SoundCloud</div>
                <div class="card-value" id="scPlays">0</div>
                <div class="card-subtext" id="scFollowers">0 фоловерів</div>
            </div>
            <div class="stat-card bandcamp" onclick="changePlatform('bandcamp')">
                <div class="card-label">Bandcamp</div>
                <div class="card-value" id="bcEarnings">0</div>
                <div class="card-subtext" id="bcStats">0 підписників</div>
            </div>
            <div class="stat-card total active" id="totalCard" onclick="changePlatform('total')">
                <div class="card-label">Загальні стрими</div>
                <div class="card-value" id="totalReach">0</div>
                <div class="card-subtext" id="totalSubs">0 сумарних підписників</div>
            </div>
        </div>

        <div class="chart-section">
            <h2 id="chartTitle">Динаміка: Загальні стрими</h2>
            <div class="chart-container">
                <canvas id="reachChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           ТВІЙ ОРИГІНАЛЬНИЙ СКРИПТ (СТРУКТУРА І ЛОГІКА ЗБЕРЕЖЕНІ НА 100%).
           Оновлено лише hex-рядки кольорів ліній для відповідності новому соковитому дизайну.
           ========================================================================== */
        let myChart = null;

        function changePlatform(platform) {
            const data = window.dashboardStats;
            if (!data) return;

            document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active'));

            let dataset = [];
            let color = '#bd00ff';
            let title = 'Загальні стрими';

            if (platform === 'youtube') {
                document.querySelector('.stat-card.youtube').classList.add('active');
                dataset = data.history.map(item => item.ytViews || 0);
                color = '#ff1a35';
                title = 'YouTube';
            } else if (platform === 'soundcloud') {
                document.querySelector('.stat-card.soundcloud').classList.add('active');
                dataset = data.history.map(item => item.scPlays || 0);
                color = '#ff6a00';
                title = 'SoundCloud';
            } else if (platform === 'bandcamp') {
                document.querySelector('.stat-card.bandcamp').classList.add('active');
                dataset = data.history.map(item => item.bcPlays || 0);
                color = '#00b0ff';
                title = 'Bandcamp';
            } else {
                document.getElementById('totalCard').classList.add('active');
                dataset = data.history.map(item => item.totalPlays || 0);
                color = '#bd00ff';
                title = 'Загальні стрими';
            }

            document.getElementById('chartTitle').innerText = `Динаміка: ${title}`;

            myChart.data.labels = data.history.map(item => item.date);
            myChart.data.datasets[0].data = dataset;
            myChart.data.datasets[0].borderColor = color;
            myChart.data.datasets[0].backgroundColor = `${color}06`;
            myChart.update();
        }

        function initDashboard() {
            const data = window.dashboardStats;
            if (!data) return;

            document.getElementById('updateTime').innerText = `Оновлено: ${data.lastUpdated || '--'}`;
            const cur = data.current || {};
            
            document.getElementById('ytViews').innerText = Number(cur.youtube?.views || 0).toLocaleString('uk-UA');
            document.getElementById('ytSubs').innerText = `${Number(cur.youtube?.subs || 0).toLocaleString('uk-UA')} підписників`;
            document.getElementById('scPlays').innerText = Number(cur.soundcloud?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('scFollowers').innerText = `${Number(cur.soundcloud?.subs || 0).toLocaleString('uk-UA')} фоловерів`;
            document.getElementById('bcEarnings').innerText = Number(cur.bandcamp?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('bcStats').innerText = `${Number(cur.bandcamp?.subs || 0).toLocaleString('uk-UA')} підписників`;
            document.getElementById('totalReach').innerText = Number(cur.totalAudioVideoViews || 0).toLocaleString('uk-UA');
            document.getElementById('totalSubs').innerText = `${Number(cur.totalSubscribers || 0).toLocaleString('uk-UA')} сумарних підписників`;

            const ctx = document.getElementById('reachChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.history.map(item => item.date),
                    datasets: [{
                        label: 'Стрими',
                        data: data.history.map(item => item.totalPlays || 0),
                        borderColor: '#bd00ff',
                        backgroundColor: 'rgba(189, 0, 255, 0.02)',
                        borderWidth: 2.5,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            left: 20,
                            right: 20,
                            top: 10,
                            bottom: 10
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(6, 8, 19, 0.95)',
                            borderColor: 'rgba(255, 255, 255, 0.08)',
                            borderWidth: 1,
                            padding: 12,
                            titleFont: { family: '-apple-system, sans-serif' },
                            bodyFont: { family: 'JetBrains Mono' },
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed.y;
                                    const dataIndex = context.dataIndex;
                                    const dataset = context.dataset.data;
                                    
                                    let changeText = "";
                                    if (dataIndex > 0) {
                                        const prevValue = dataset[dataIndex - 1];
                                        const diff = value - prevValue;
                                        const sign = diff >= 0 ? "+" : "";
                                        changeText = ` (${sign}${diff.toLocaleString('uk-UA')})`;
                                    }
                                    
                                    return `${value.toLocaleString('uk-UA')}${changeText}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#858fae', font: { family: 'JetBrains Mono', size: 11 } } }
                    }
                }
            });
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
