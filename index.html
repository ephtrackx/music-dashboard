<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOXCORE // Music Dashboard v2.3</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Ховаємо весь інтерфейс за замовчуванням для безпеки */
        html {
            background-color: #14161d;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        :root {
            /* Пастельна muted палітра */
            --bg-color: #14161d;
            --card-bg: #1a1d24;
            --card-border: #232733;
            --text-main: #dee0e6;
            --text-muted: #727a8e;
            
            /* М'які пастельні кольори платформ */
            --youtube: #e06c75;       
            --soundcloud: #f0a986;    
            --bandcamp: #7aa2f7;      
            --total: #b4befe;         
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            margin-bottom: 40px;
            text-align: left;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .last-updated {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Сітка карток */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .stat-card .card-label {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-card .card-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .stat-card.youtube .card-value { color: var(--youtube); }
        .stat-card.soundcloud .card-value { color: var(--soundcloud); }
        .stat-card.bandcamp .card-value { color: var(--bandcamp); }
        .stat-card.total .card-value { color: var(--total); }

        .stat-card .card-subtext {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Блок з графіком */
        .chart-section {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .chart-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 24px 0;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
    <script>
        // Перевірка авторизації
        (function() {
            const secureHash = "Rm94Q29yZTIwMjY="; // Пароль: FoxCore2026
            let pass = localStorage.getItem('music_dashboard_token');
            
            if (!pass || btoa(pass) !== secureHash) {
                pass = prompt("Введіть пароль доступу:");
                if (pass && btoa(pass) === secureHash) {
                    localStorage.setItem('music_dashboard_token', pass);
                } else {
                    alert("Доступ заборонено!");
                    localStorage.removeItem('music_dashboard_token');
                    document.write('<body style="background:#14161d;color:#e06c75;text-align:center;padding-top:200px;font-family:sans-serif;"><h2>403 // СТОП</h2></body>');
                    return;
                }
            }
            document.documentElement.style.opacity = "1";
        })();
    </script>
    <script src="stats.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>FOXCORE // Music Dashboard</h1>
            <div class="last-updated" id="updateTime">Оновлення: --</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card youtube">
                <div class="card-label">YouTube</div>
                <div class="card-value" id="ytViews">0</div>
                <div class="card-subtext" id="ytSubs">0 підписників</div>
            </div>
            <div class="stat-card soundcloud">
                <div class="card-label">SoundCloud</div>
                <div class="card-value" id="scPlays">0</div>
                <div class="card-subtext" id="scFollowers">0 фоловерів</div>
            </div>
            <div class="stat-card bandcamp">
                <div class="card-label">Bandcamp</div>
                <div class="card-value" id="bcEarnings">0</div>
                <div class="card-subtext" id="bcStats">0 підписників</div>
            </div>
            <div class="stat-card total">
                <div class="card-label">Загальні стрими</div>
                <div class="card-value" id="totalReach">0</div>
                <div class="card-subtext" id="totalSubs">0 сумарних підписників</div>
            </div>
        </div>

        <div class="chart-section">
            <h2>Динаміка росту охоплення</h2>
            <div class="chart-container">
                <canvas id="reachChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        function initDashboard() {
            // Зчитуємо саме ту змінну, яку створює твій скрипт
            const data = window.dashboardStats;
            
            if (!data) {
                console.error("Помилка: Дані не знайдені в window.dashboardStats");
                return;
            }

            // Заповнення часу оновлення
            document.getElementById('updateTime').innerText = `Оновлено: ${data.lastUpdated || '--'}`;
            
            const cur = data.current || {};
            
            // YouTube
            document.getElementById('ytViews').innerText = Number(cur.youtube?.views || 0).toLocaleString('uk-UA');
            document.getElementById('ytSubs').innerText = `${Number(cur.youtube?.subs || 0).toLocaleString('uk-UA')} підписників`;
            
            // SoundCloud
            document.getElementById('scPlays').innerText = Number(cur.soundcloud?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('scFollowers').innerText = `${Number(cur.soundcloud?.subs || 0).toLocaleString('uk-UA')} фоловерів`;
            
            // Bandcamp
            document.getElementById('bcEarnings').innerText = Number(cur.bandcamp?.plays || 0).toLocaleString('uk-UA');
            document.getElementById('bcStats').innerText = `${Number(cur.bandcamp?.subs || 0).toLocaleString('uk-UA')} підписників`;
            
            // Total
            document.getElementById('totalReach').innerText = Number(cur.totalAudioVideoViews || 0).toLocaleString('uk-UA');
            document.getElementById('totalSubs').innerText = `${Number(cur.totalSubscribers || 0).toLocaleString('uk-UA')} сумарних підписників`;

            // Будуємо графік історії росту
            if (!data.history || data.history.length === 0) return;

            const labels = data.history.map(item => item.date);
            const reachDataset = data.history.map(item => item.totalPlays); // Використовуємо поле totalPlays з твоєї історії

            const ctx = document.getElementById('reachChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Сумарні прослуховування',
                            data: reachDataset,
                            borderColor: '#b4befe',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.3,
                            pointBackgroundColor: '#7aa2f7',
                            pointRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#727a8e',
                                font: { size: 12, family: 'sans-serif' },
                                boxWidth: 15,
                                padding: 15
                            }
                        } 
                    },
                    scales: {
                        x: { 
                            grid: { color: '#232733' }, 
                            ticks: { color: '#727a8e', font: { size: 11 } } 
                        },
                        y: { 
                            grid: { color: '#232733' }, 
                            ticks: { color: '#727a8e', font: { size: 11 } } 
                        }
                    }
                }
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
